name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["Build & Publish Images"]
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy via composite action
        uses: ./.github/actions/ssh-deploy
        with:
          host: ${{ secrets.PROD_HOST }}
          user: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_PORT }}
          ssh_key: ${{ secrets.PROD_SSH_KEY }}
          ghcr_username: ${{ github.actor }}
          ghcr_token: ${{ github.token }}
          grafana_admin_user: ${{ secrets.GRAFANA_ADMIN_USER }}
          grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          repository: ${{ github.repository }}
          sha: ${{ github.event.workflow_run.head_sha }}

      - name: Verify production health
        if: ${{ env.PROD_DOMAIN != '' }}
        env:
          DOMAIN: ${{ env.PROD_DOMAIN }}
          ORIGIN_IP: ${{ secrets.PROD_ORIGIN_IP }}
        run: |
          set -e
          echo "Waiting for public app health at https://$DOMAIN ..."
          for i in {1..60}; do
            if [ -n "$ORIGIN_IP" ]; then
              curl -fsS -m 10 --resolve "$DOMAIN:443:$ORIGIN_IP" "https://$DOMAIN/health" >/dev/null && ok=1 || ok=0
            else
              curl -fsS -m 5 "https://$DOMAIN/health" >/dev/null && ok=1 || ok=0
            fi
            if [ "$ok" -eq 1 ]; then
              echo "Public app health endpoint healthy."
              echo "Verifying Grafana is not publicly exposed..."
              status="$(curl -L -s -o /dev/null -w "%{http_code}" "https://$DOMAIN/monitoring/grafana/api/health" || true)"
              case "$status" in
                401|403|404)
                  echo "OK: public Grafana endpoint is not exposed: $status"
                  ;;
                *)
                  echo "ERROR: public Grafana endpoint should not be reachable, got: $status" >&2
                  exit 1
                  ;;
              esac

              echo "Verifying removed/private public paths are not reachable..."
              for path in "/monitoring/grafana/" "/monitoring/grafana/api/health" "/assets/index-D97KyDEI.js.map"; do
                status="$(curl -L -s -o /tmp/public-check-body -w "%{http_code}" "https://$DOMAIN$path" || true)"

                case "$status" in
                  401|403|404)
                    echo "OK: $path -> $status"
                    ;;
                  *)
                    echo "ERROR: $path should return 401/403/404, got $status" >&2
                    head -20 /tmp/public-check-body >&2 || true
                    exit 1
                    ;;
                esac
              done

              echo "Verifying active OG image..."
              og_status="$(curl -L -s -o /dev/null -w "%{http_code}" "https://$DOMAIN/og-image.png" || true)"
              og_type="$(curl -L -s -I "https://$DOMAIN/og-image.png" | awk -F': ' 'tolower($1)=="content-type"{print tolower($2); exit}')"

              if [ "$og_status" != "200" ] || ! printf "%s" "$og_type" | grep -q "image/png"; then
                echo "ERROR: /og-image.png should return 200 image/png, got status=$og_status content-type=$og_type" >&2
                exit 1
              fi

              echo "OK: /og-image.png returns 200 image/png"

              echo "Verifying SVG preview fallback..."
              og_svg_status="$(curl -L -s -o /dev/null -w "%{http_code}" "https://$DOMAIN/og-image.svg" || true)"
              og_svg_type="$(curl -L -s -I "https://$DOMAIN/og-image.svg" | awk -F': ' 'tolower($1)=="content-type"{print tolower($2); exit}')"

              if [ "$og_svg_status" != "200" ] || ! printf "%s" "$og_svg_type" | grep -q "image/svg+xml"; then
                echo "ERROR: /og-image.svg should return 200 image/svg+xml, got status=$og_svg_status content-type=$og_svg_type" >&2
                exit 1
              fi

              echo "OK: /og-image.svg returns 200 image/svg+xml"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: Public app health check failed at https://$DOMAIN/health" >&2
          exit 1
