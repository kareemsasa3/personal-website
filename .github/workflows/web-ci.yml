name: Build & Publish Images

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify web directory
        run: |
          ls -la
          ls -la web
          test -f web/Dockerfile && echo "Found web/Dockerfile" || (echo "Missing web/Dockerfile" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image (local, PRs only)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          load: true
          push: false
          tags: |
            web:ci
          build-args: |
            VITE_TURNSTILE_SITE_KEY=

      - name: Build and push web image (GHCR, main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/web:latest
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Scan web image with Trivy (local)
        if: github.ref != 'refs/heads/main'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: web:ci
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan web image with Trivy (remote)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: 1

      # Alternative: build from within the web directory
      # - name: Build (working-directory: web)
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ./web
      #     file: ./web/Dockerfile
      #     load: true
      #     tags: web:ci
      #     build-args: |
      #       VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      #       VITE_AI_BACKEND_URL=${{ secrets.VITE_AI_BACKEND_URL }}
