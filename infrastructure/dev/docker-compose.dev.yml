services:
  # Web - Development mode with live reloading
  web:
    container_name: portfolio-web-dev
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=${DEV_NODE_ENV:-development}
      - HMR_HOST=${HMR_HOST:-}
    volumes:
      - ../web:/app
      - /app/node_modules
    command: npm run dev -- --host --no-open

  # Nginx - Always running in development mode (HTTP-only, no SSL)
  nginx:
    container_name: portfolio-nginx-dev
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.dev:/etc/nginx/conf.d:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - web
