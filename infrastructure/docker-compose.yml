name: personal-website
services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - portfolio-network

  # Web - Main portfolio application
  web:
    image: ${WEB_IMAGE:-web:local}
    build:
      context: ../web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${WEB_NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
